name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Trim debuginfo to line tables only. The bulk of a `cargo test` target dir is
  # dependency debuginfo (deps build under the dev profile, tests under test), so
  # shrinking both keeps panics' file:line while cutting disk use and link time.
  # CI-only; local builds keep full debuginfo.
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only

jobs:
  # ---------- Lint ----------

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: make fmt-check

  workspace-inheritance:
    name: Workspace Inheritance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: RomarQ/cargo-workspace-inheritance-check@v1
        with:
          promotion-threshold: 1
          promotion-failure: true

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: make clippy

  # ---------- Check + Test ----------

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/free-disk-space
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make check

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/free-disk-space
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make test

  conformance:
    name: Conformance (interpreter vs TS runtime)
    # Cross-checks the Rust IR interpreter against the canonical
    # @midnight-ntwrk/compact-runtime: regenerates the golden reports with
    # the TS driver and fails if they drift from what is committed, then
    # replays them through the interpreter. Needs Node but neither Nix nor
    # the compiler; the corpus codegen is committed with the fixtures.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/conformance/package-lock.json
      - name: Regenerate goldens with the canonical TS runtime
        run: make conformance-regen
      - name: Fail on stale goldens
        run: git diff --exit-code tests/conformance/expected
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Replay through the Rust interpreter
        run: make conformance

  macos:
    name: macOS check + unit tests
    # Contributors develop on macOS; this catches platform-specific breakage
    # (home_dir resolution, TLS backends, libsecp256k1 build flags) that the
    # Linux-only devnet e2e job never exercises. No devnet here: the node +
    # indexer stack is Linux Docker only.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make check
      - run: make test

  audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    # `rustsec/audit-check` annotates findings via the Checks API. Default
    # GITHUB_TOKEN permissions on push-to-main don't include `checks: write`,
    # which made the action fail with "Resource not accessible by integration"
    # rather than report the underlying advisories.
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---------- E2E (devnet: node + indexer) ----------

  e2e:
    name: E2E tests (devnet)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4

      # rust-lld bus-errors on ubuntu-latest when target/ + container data fill
      # the runner's ~14 GB free disk (symptom: `collect2: fatal error: ld
      # terminated with signal 7 [Bus error]` during the example link step).
      - uses: ./.github/actions/free-disk-space

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache midnight-rs build
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: midnight-rs

      # Compile everything BEFORE starting the devnet so the link steps
      # don't compete with the running node + indexer for runner memory and
      # disk. Combined with the disk-free step above, this fully covers the
      # bus-error symptom seen on examples-counter / shielded-transfer.
      - name: Pre-build e2e binaries
        run: |
          cargo test --no-run --test node_e2e
          cargo test --no-run -p midnight-wallet --test integration
          cargo build -p example-counter -p example-contract-maintenance -p example-private-state -p example-shielded-transfer -p example-wallet-sync

      # --- Start devnet (node + indexer); waits until both are ready ---
      - name: Start devnet
        run: make dev-up

      # --- Run e2e tests (binaries already built above) ---
      - name: Run e2e tests
        run: make test-e2e

      - name: Wait for indexer to process pending blocks
        run: |
          # The e2e tests submit transactions that may still be in the mempool.
          # Wait for at least two new blocks so the indexer catches up and the
          # counter example sees the latest chain state (avoids DustDoubleSpend).
          start_height=$(curl -sf http://127.0.0.1:8088/api/v3/graphql \
            -H "Content-Type: application/json" \
            -d '{"query":"{ block { height } }"}' | jq '.data.block.height')
          target=$((start_height + 2))
          echo "Waiting for indexer to reach height $target (currently $start_height)..."
          for i in $(seq 1 30); do
            height=$(curl -sf http://127.0.0.1:8088/api/v3/graphql \
              -H "Content-Type: application/json" \
              -d '{"query":"{ block { height } }"}' | jq '.data.block.height')
            if [ "$height" -ge "$target" ]; then
              echo "Indexer at height $height, ready."
              break
            fi
            sleep 2
          done

      - name: Run counter example
        run: make run-counter

      - name: Run private-state example
        run: make run-private-state

      - name: Run contract-maintenance example
        run: make run-contract-maintenance

      - name: Run shielded-transfer example
        run: make run-shielded-transfer

      # wallet-sync: read-only sync + balance print (no txs). `make run-wallet-sync`
      # sets MIDNIGHT_WALLET_SEED to the devnet's prefunded seed so the output
      # shows non-zero balances and catches dust-math display regressions.
      - name: Run wallet-sync example (read-only against devnet)
        run: make run-wallet-sync

      - name: Stop devnet
        if: always()
        run: make dev-down
