name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------- Lint ----------

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  workspace-inheritance:
    name: Workspace Inheritance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: RomarQ/cargo-workspace-inheritance-check@v1
        with:
          promotion-threshold: 1
          promotion-failure: true

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  # ---------- Check + Test ----------

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo check -p example-counter

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # ---------- E2E (devnet: node + indexer) ----------

  e2e:
    name: E2E tests (devnet)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # --- Start devnet (node + indexer) via docker compose ---
      - name: Start devnet
        working-directory: examples/counter
        run: |
          docker compose up -d
          echo "Waiting for node..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9944/health > /dev/null 2>&1; then
              echo "Node is ready"
              break
            fi
            sleep 2
          done
          echo "Waiting for indexer..."
          indexer_ready=false
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8088/api/v3/graphql \
              -H "Content-Type: application/json" \
              -d '{"query":"{ block { height } }"}' | grep -q "data"; then
              echo "Indexer is ready"
              indexer_ready=true
              break
            fi
            sleep 2
          done
          if [ "$indexer_ready" != "true" ]; then
            echo "ERROR: Indexer failed to become ready"
            docker compose logs
            exit 1
          fi

      # --- Run e2e tests ---
      - name: Cache midnight-rs build
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: midnight-rs

      - name: Run e2e tests
        run: |
          cargo test --test node_e2e -- --show-output
          cargo test -p midnight-wallet --test integration -- --show-output
        env:
          MIDNIGHT_NODE_URL: ws://127.0.0.1:9944
          MIDNIGHT_INDEXER_URL: http://127.0.0.1:8088
          MIDNIGHT_E2E: "1"

      - name: Run counter example
        run: cargo run -p example-counter

      - name: Stop devnet
        if: always()
        working-directory: examples/counter
        run: docker compose down
