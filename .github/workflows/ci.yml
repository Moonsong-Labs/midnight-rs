name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------- Lint ----------

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  workspace-inheritance:
    name: Workspace Inheritance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: RomarQ/cargo-workspace-inheritance-check@v1
        with:
          promotion-threshold: 1
          promotion-failure: true

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  # ---------- Check + Test ----------

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo check -p example-counter

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # ---------- E2E (node-only, no indexer) ----------

  e2e:
    name: E2E tests (node)
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4

      # --- Build the midnight-node from fork ---
      - name: Checkout midnight-node fork
        uses: actions/checkout@v4
        with:
          repository: RomarQ/midnight-node
          ref: feat/query-contract-state-v2
          path: midnight-node

      - uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Cache midnight-node build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: midnight-node
          prefix-key: midnight-node

      - name: Build midnight-node
        working-directory: midnight-node
        run: cargo build --release -p midnight-node
        timeout-minutes: 60

      # --- Start the dev node ---
      - name: Start dev node
        working-directory: midnight-node
        env:
          CFG_PRESET: dev
        run: |
          ./target/release/midnight-node \
            --dev \
            --rpc-external \
            --rpc-cors=all \
            --rpc-port=9944 \
            --tmp &
          echo "Waiting for node to start..."
          for i in $(seq 1 30); do
            if curl -s -X POST http://localhost:9944 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","method":"system_health","params":[],"id":1}' | grep -q "result"; then
              echo "Node is ready"
              break
            fi
            sleep 2
          done

      # --- Start the indexer ---
      - name: Start indexer
        run: |
          docker run -d --name midnight-indexer \
            --network host \
            -e RUST_LOG=info \
            -e APP__INFRA__SECRET=303132333435363738393031323334353637383930313233343536373839303132 \
            -e APP__INFRA__NODE__URL=ws://127.0.0.1:9944 \
            midnightntwrk/indexer-standalone:4.0.0
          echo "Waiting for indexer to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8088/api/v3/graphql \
              -H "Content-Type: application/json" \
              -d '{"query":"{ block { height } }"}' | grep -q "data"; then
              echo "Indexer is ready"
              break
            fi
            sleep 2
          done

      # --- Run e2e tests ---
      - name: Cache midnight-rs build
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: midnight-rs

      - name: Run e2e tests
        run: cargo test --test node_e2e -- --show-output
        env:
          MIDNIGHT_NODE_URL: ws://127.0.0.1:9944

      - name: Run counter example
        run: cargo run -p example-counter
